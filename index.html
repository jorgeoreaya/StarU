<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StarU - Plataforma que conecta emprendedores y startups con inversores. Crea tu perfil, muestra tu pitch y encuentra financiamiento." />
    <title>StarU — Conecta tu emprendimiento con inversores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Evita el flash de tema: aplica .dark antes de pintar (default oscuro).
      (function () {
        try {
          var t = localStorage.getItem('staru-theme')
          if (t !== 'light') document.documentElement.classList.add('dark')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
